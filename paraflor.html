<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Flor</title>
    <style>
        /* =========================================
           DISEÑO Y ESTILOS (CSS)
           ========================================= */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: linear-gradient(135deg, #121212, #2c3e50);
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Evita que aparezcan barras de desplazamiento */
            position: relative;
        }

        /* Tarjeta estilo cristal (Glassmorphism) */
        .tarjeta-profesional {
            text-align: center;
            z-index: 10;
            background: rgba(255, 255, 255, 0.05);
            padding: 50px 80px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s ease;
        }

        .tarjeta-profesional:hover {
            transform: scale(1.02);
        }

        h1 {
            font-size: 4rem;
            margin: 0 0 10px 0;
            color: #e6b981; /* Tono similar a la corteza del pan */
            letter-spacing: 2px;
            font-weight: 700;
        }

        p {
            font-size: 2rem;
            margin: 0;
            font-weight: 300;
            letter-spacing: 1px;
            color: #e0e0e0;
        }

        /* Estilo base de las migajas */
        .migaja {
            position: absolute;
            top: -20px;
            background-color: #d4a373; /* Color de migaja de pan tostado */
            opacity: 0.8;
            pointer-events: none; /* Para que no interfieran con el mouse */
            animation: caer linear infinite;
        }

        /* Animación de caída */
        @keyframes caer {
            0% {
                transform: translateY(-20px) rotate(0deg);
            }
            100% {
                transform: translateY(110vh) rotate(360deg);
            }
        }
    </style>
</head>
<body>

    <div class="tarjeta-profesional">
        <h1>Flor,</h1>
        <p>¡Deja lo migajera!</p>
    </div>

    <script>
        /* =========================================
           LÓGICA DE ANIMACIÓN (JavaScript)
           ========================================= */
        
        function crearMigaja() {
            const migaja = document.createElement('div');
            migaja.classList.add('migaja');

            // Tamaño aleatorio para que se vean como migajas reales (entre 4px y 12px)
            const size = Math.random() * 8 + 4;
            migaja.style.width = `${size}px`;
            migaja.style.height = `${size}px`;

            // Forma irregular (bordes aleatorios para que no sean círculos perfectos)
            const radio1 = Math.random() * 50 + 20;
            const radio2 = Math.random() * 50 + 20;
            const radio3 = Math.random() * 50 + 20;
            const radio4 = Math.random() * 50 + 20;
            migaja.style.borderRadius = `${radio1}% ${radio2}% ${radio3}% ${radio4}%`;

            // Posición horizontal aleatoria
            migaja.style.left = `${Math.random() * 100}vw`;

            // Velocidad de caída aleatoria (entre 2 y 6 segundos)
            const duracion = Math.random() * 4 + 2; 
            migaja.style.animationDuration = `${duracion}s`;

            // Pequeña variación en el color (algunas más tostadas que otras)
            const opacidad = Math.random() * 0.5 + 0.5;
            migaja.style.opacity = opacidad;

            // Agregamos la migaja a la pantalla
            document.body.appendChild(migaja);

            // Limpiamos la migaja una vez que sale de la pantalla para no saturar la memoria
            setTimeout(() => {
                migaja.remove();
            }, duracion * 1000);
        }

        // Generar una nueva migaja cada 100 milisegundos
        setInterval(crearMigaja, 100);
    </script>
</body>
</html>
